# ============================================
# LOANAI BACKEND CONFIGURATION
# PostgreSQL Database: loan_system
# ============================================

# Server
server.port=8080
spring.application.name=loanai

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/loan_system
spring.datasource.username=postgres
spring.datasource.password=gvB@2004
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================
# Email Configuration (Gmail SMTP for OTP)
# ============================================
# UPDATE THESE WITH YOUR GMAIL CREDENTIALS!
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=placeholder@gmail.com
spring.mail.password=placeholder_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================
# OTP Configuration
# ============================================
otp.expiry.minutes=2
otp.max.attempts=3

# ============================================
# ML Service Configuration
# ============================================
ml.service.url=http://localhost:5000

# ============================================
# CORS Configuration
# ============================================
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ============================================
# Security
# ============================================
# BCrypt strength
security.password.strength=10

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.loanai=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# File Upload (Optional)
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
